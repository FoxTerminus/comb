# SambaY 1B model configuration
# Aligned with ArchScale `sambay_d16`, block_size raised to 65536 for 64K training.

org: "Microsoft"
name: "sambay_d16"
block_size: 65536
vocab_size: 32000
padding_multiple: 64
n_layer: 16
n_head: 16
n_embd: 1984          # ar * n_layer = 124 * 16
ar: 124
mlp_expand: 4
intermediate_size: 7936
head_dim: 128
n_query_groups: 4       # GQA with 4 key-value heads
rnn_per_layer: 2
rnn_type: "mamba"
yoco: true
gmu_yoco: true          # Gated Memory Unit ENABLED
nope: true
local_window: 128
rope_base: 10000
tied_embed: false
norm_eps: 1.0e-5
